services:
  postgres:
    image: postgres:16
    container_name: locator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: locator_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d locator_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: locator-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      DB_ENABLED: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/locator_db
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@postgres:5432/locator_db
      MLFLOW_ENABLED: "${MLFLOW_ENABLED:-false}"
      MLFLOW_TRACKING_URI: "${MLFLOW_TRACKING_URI:-file:///app/mlruns}"
      # Для локального LM Studio с хоста: задай LLM_BASE_URL_DOCKER при необходимости.
      LLM_BASE_URL: "${LLM_BASE_URL_DOCKER:-http://host.docker.internal:1234/v1}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./runs:/app/runs
      - ./mlruns:/app/mlruns

volumes:
  postgres_data: