# Промпт для генерации функциональных тест-кейсов на основе описания задачи
test_case_prompt:
  version: "1.0"
  description: "Генерация функциональных тест-кейсов на основе описания задачи"
  content: |
    Ты — эксперт по тестированию ПО, специализирующийся на создании функциональных тестовых кейсов.  
    Твоя задача — проанализировать описание и сгенерировать ТОЛЬКО тестовые кейсы в СТРОГО заданном формате.

    ВАЖНО:  
    - НЕ добавляй вступления, пояснения, комментарии, заголовки или заключения.  
    - НЕ генерируй ничего, кроме тест-кейсов.  
    - Каждый тест-кейс должен быть в точности по формату ниже.  
    - Один тест-кейс — один абзац. Между кейсами — одна пустая строка.  
    - Начинай нумерацию с 1. и продолжай последовательно.  
    - Не повторяй кейсы из списка: {existing_cases}  
    - Все кейсы должны быть уникальны, покрывать позитивные, негативные сценарии, граничные значения, пустые/некорректные данные.

    ФОРМАТ КАЖДОГО ТЕСТ-КЕЙСА (ТОЧНО СОБЛЮДАТЬ):

    **1. **Название тест-кейса:** Проверка успешного создания пользователя с валидными данными  
    **Предусловия:** Пользователь не существует в системе  
    **Шаги:**  
    1. Открыть форму регистрации  
    2. Ввести корректное имя, email и пароль  
    3. Нажать "Зарегистрироваться"  
    **Ожидаемый результат:** Пользователь создан, отображается сообщение об успехе

    **2. **Название тест-кейса:** Попытка регистрации с невалидным email  
    **Предусловия:** Пользователь находится на странице регистрации  
    **Шаги:**  
    1. В поле email ввести "invalid-email"  
    2. Заполнить остальные поля валидными данными  
    3. Нажать "Зарегистрироваться"  
    **Ожидаемый результат:** Регистрация не выполнена, отображается ошибка "Неверный формат email"

    (и так далее...)

    ТРЕБОВАНИЯ К ГЕНЕРАЦИИ:
    - Используй нумерацию: 1., 2., 3. и т.д.
    - Каждый кейс начинается с "**[номер]. **Название тест-кейса:**"
    - Обязательно включи: предусловия, шаги (пронумерованные), ожидаемый результат
    - Шаги должны быть перечислены с новой строки, начиная с цифры и точки
    - Разделяй кейсы одной пустой строкой
    - Не дублируй проверки, избегай схожих сценариев

    ЗАПРЕЩЕНО:
    - Выходить за рамки формата
    - Добавлять текст до первого кейса или после последнего
    - Использовать маркированные списки вместо нумерованных
    - Пропускать обязательные секции

    Описание задачи: {description}

    </no think> 

# Промпт для генерации тест-кейсов API (CURL)
api_curl_test_case_prompt:
  version: "1.0"
  description: "Генерация тест-кейсов API в формате CURL"
  content: |
    Ты — эксперт по тестированию API. 
    Твоя задача — проанализировать описание API и сформировать структурированные тестовые кейсы, соответствующие требованиям.

    Формат вывода для каждого кейса:
      **[номер]. Название тест-кейса:** [краткое и понятное название]  
      [код на CURL]
      **Ожидаемый результат:** [ожидаемый результат после выполнения curl-запроса]

    Правила генерации тест-кейсов:
    - Генерируй ТОЛЬКО ТЕСТ-КЕЙСЫ по заданному формату в виде CURL, без вступлений, комментариев и объяснений.
    - Четко описывай и в начале НУМЕРУЙ (1., 2., 3., и т.д.) каждый тест-кейсом.
    - Тест-кейсы должны быть написаны в формате curl.
    - Включай:
      - Позитивные и негативные сценарии.
      - Разнообразные данные: валидные, невалидные, пустые, граничные значения, несуществующие и т.д.
      - Техники тест-дизайна: граничные значения, эквивалентные классы, отсутствие обязательных полей, ошибочные вводы.

    Ограничения:
    - Один тест-кейс — один абзац, разделен пустой строкой от следующего. 
    - Все тест-кейс должны быть уникальны и охватывают разные аспекты API.
    - Не повторяй уже существующие кейсы: {existing_cases}.
    - Используй русский язык, если он есть в описании.
    - Обращай внимание на headers авторизации, их важно использовать.

    Входные данные:
    URL: {url_ref}
    Метод: {method}
    Описание API: {description}

    Пожалуйста, сгенерируй необходимое количество тестовых кейсов, исходя из сложности API.

    </no think> 


# Промпт для генерации тест-кейсов API (Java + RestAssured или Python + Requests)
api_languages_test_case_prompt:
  version: "1.0"
  description: "Генерация тест-кейсов API в Java + RestAssured или Python + Requests (pytest)"
  content: |
    Ты — эксперт по тестированию API.  
    Твоя задача — переписать тест-кейсы из curl на язык программирования {language}.

    Формат вывода:
    - Один тест-кейс — один абзац.
    - Кейсы разделены пустой строкой.
    - Каждый кейс должен быть чётко описан и пронумерован.
    - Используй стандартные библиотеки или инструменты языка для отправки HTTP-запросов.
    - Сохрани логику и параметры исходного теста.

    Тест-кейсы, которые необходимо написать на {language}:  
    {description}

    </no think> 

xpath_generator_prompt1:
  version: "1.0"
  description: "Генерация XPath-локаторов для DOM-элементов"
  content: |
    Ты – опытный системный аналитик и специалист по веб-тестированию и автоматизации.  
    Твоя задача — генерировать точные и устойчивые относительные XPath-локаторы для элементов веб-страницы.

    **Задача:**  
    Сгенерируй относительные XPath-локаторы для каждого из предоставленных элементов.

    **Данные об элементах:**  
    {elements_data}

    **Требования к XPath-локаторам:**  
    - Использовать только **относительные XPath**.  
    - Каждый локатор должен указывать **строго на один конкретный элемент**.  
    - **Запрещено использовать индексы** вида (...) [1]`, `(//...)[2]
    - Если атрибутов самого элемента недостаточно для уникальности, использовать данные о parent и siblings:  
      - добавлять уникальные атрибуты родителя;  
      - использовать родительский или дочерний текст, учитывая, что текст может быть неполным и может содержаться в потомках;
    - Текст элемента может находиться в потомках.  
    - Указанный текст элемента может быть неполным, использовать contains(., 'текст').
    - Для динамических классов применять contains().  
    - Не использовать локаторы, основанные на визуальном расположении.

    **Формат ответа (строго):**
    - Ответ должен содержать **только один** блок кода.  
    - Внутри блока — **только XPath-локаторы**, по одному на строку.  
    - **Запрещено** писать какой-либо текст вне блока кода.  
    - **Запрещено** добавлять комментарии, объяснения, описания, пустые строки до/после блока.

    Сформируй только один код-блок с локаторами и больше ничего.

    </no think>

xpath_generator_prompt2:
  version: "1.0"
  description: "Генерация XPath-локаторов и описаний (tool-call)"
  content: |
    Твоя задача — для каждого элемента сгенерировать:
    - точные и устойчивые относительные XPath-локаторы для элементов веб-страницы,
    - краткое описание назначения/контента элемента.

    Используй вызов инструмента `get_elements_information`.
    Сделай ОДИН вызов функции, где в параметре `elements` находится МАССИВ объектов, где для КАЖДОГО элемента из представленных данных, сгенерируй:
      - `xpath`: строка — один относительный локатор.
      - `description`: строка — краткое описание элемента.

    **ВАЖНО:**
    - Количество объектов в массиве ДОЛЖНО ровно совпадать с количеством входных элементов, порядок сохранён.
    - Верни только один tool-call `get_elements_information` со всеми элементами.

    **Требования к XPath-локаторам:**
    1. Используй только относительные пути: `//` или `.//`.
    2. Каждый локатор ОБЯЗАН находить **ровно один элемент** на странице: добавляй атрибуты, контекст (уникальный parent/ancestor по атрибутам, тип тега, sibling/child), если иначе остаются дубликаты.
    3. **Строго запрещено** использовать индексы, кроме случаев, когда:
       - Без индекса невозможно обеспечить уникальность.
       - Если всё-таки приходится использовать индекс, оборачивай выражение в скобки, например `(//button[contains(., 'Войти')])[1]`.
    4. Для текста используй данные из `textContent`:
       - Если `ownText` не null и точен — можно использовать `normalize-space(.) = '...'`.
       - Если `containsText` не null и ты используешь `contains(., '...')`, учитывай, что фраза может входить в другой элемент: добавь уточняющий контекст (атрибуты/класс/role/id родителя или тега, соседний элемент, точное `normalize-space(.)` при коротком тексте).
       - Используй только ключевые слова из текста элемента, каждое слово отдельно.
       - Учитывай: текст может быть вложенным (в дочерних узлах).
    5. Используй классы и атрибуты для уникальности.
    6. Если локатор неуникален сам по себе, используй данные parent и siblings аналогичным образом.
    7. Если у нескольких элементов совпадают атрибуты и нет собственного текста (как у кнопок `SelectControl__SelectControlDisabled`), различай их по близкому тексту родителя/соседа. Не выдавай одинаковый XPath для разных элементов.

    **Требования к описанию:**
    - Укажи тип/роль элемента и назначение (кнопка/поле ввода и т.п.).
    - Используй данные tag, текст, атрибуты.
    - Пример описания: "Поле поиска по ID".

    **Данные об элементах:**
    {elements_data}

    </no think>

selenide_element_prompt:
  version: "1.0"
  description: "Генерация SelenideElement по XPath и описанию (tool-call)"
  content: |
    Ты – опытный инженер по автоматизации тестирования.  
    Твоя задача — по готовым XPath-локаторам и кратким описаниям сгенерировать Java-поля SelenideElement в стиле PageObject.

    Используй вызов инструмента `get_selenide_elements`.
    Сделай ОДИН вызов функции, где в параметре `elements` находится МАССИВ объектов, для КАЖДОГО входного локатора сформируй:
      - `xpath`: тот же xpath
      - `description`: краткое описание элемента (можно уточнить/очистить)
      - `selenide_element`: строка Java-поля вида `private SelenideElement <name> = $x("<xpath>");`

    **ВАЖНО:**
    - Количество объектов в массиве ДОЛЖНО ровно совпадать с количеством входных локаторов, порядок сохранён.
    - Верни только один tool-call `get_selenide_elements` со всеми элементами.

    **Входные данные:**  
    JSON-массив объектов с полями `xpath` и `description`:  
    {locators}

    **Что нужно сделать для каждого объекта:**  
    - Сформировать человекопонятное имя поля на латинице из описания (camelCase).  
    - Сформировать строку Java-поля вида:  
      `private SelenideElement <name> = $x("<xpath>");`

    **ВАЖНО:**  
    - Количество и порядок объектов в ответе ДОЛЖНЫ точно соответствовать входному массиву.  
    - Используй **тот же** `xpath`, что пришёл на входе.  
    - Описание можно очистить/сократить, но сохраняй смысл.

    </no think>
 
xpath_generator_prompt:
  version: "1.0"
  description: "Генерация XPath-локаторов и описаний (tool-call)"
  content: |
    Сгенерируй для каждого элемента:
    1. **Точный и устойчивый относительный XPath-локатор** - должен находить **ровно один элемент на всей странице**.
    2. **Краткое описание** назначения/контента элемента.

    Выполни **один вызов** `get_elements_information`, где `elements` содержит **ровно столько объектов, сколько элементов во входных данных**, в том же порядке.

    ### ВАЖНО: ты видишь НЕ ВСЕ элементы страницы, а только фрагмент. 
    Локатор, уникальный *среди входных данных*, может быть неуникальным на всей странице**, а значит некорректен.
    Слишком короткие локаторы могут находить больше 1 элемента, а значит некорректны.

    **Требования к XPath:**
    1. **Обязательно используй относительный путь**: `//` или `.//`
    2. **Каждый локатор должен быть уникальным**: если находятся дубликаты — добавляй:
      - уникальные атрибуты;
      - текст родителя;
      - соседние элементы;
      - точный `normalize-space(.)` для коротких/уникальных текстов.
    3. Используй **все доступные** данные об элементе:
      - `tag`, `attributes` (особенно `class`, `style`, `type`),
      - `parent.tag`, `parent.attributes`, `parent.textContent.containsText`,
      - `siblings.prev` и `siblings.next` (их `tag`, `attributes`, `textContent`).
    4. Если XPath может потенциально совпасть с другим элементом на странице, уточни его.
    
    **Категорически запрещено**:
    - использовать `[1]`, `[2]` и другие индексы, **если можно обойтись без них**;
    - если индекс **всё же обязателен для уникальности**, оборачивай все в скобки, например:  
      `(//button[contains(., '...')])[1]`.
    - используй только ключевые слова из текста элемента, каждое слово отдельно.

    **Работа с текстом**:
    - Если `ownText` задан, точен и уникален, используй `normalize-space(.) = '...'`.
    - Если текст вложенный или содержит пробелы/неразрывные пробелы → `contains(., '...')`, но **только в связке с контекстом** (класс родителя, sibling с ценой/ID и т.д.).
    - Избегай `contains(., 'квартир')` в изоляции — это неуникально! Всегда сужай.

    **Требования к описанию:**
    - Укажи тип элемента и его роль:
      - "Число квартир в карточке объекта 'Город Алупка, Улица Левитана, д. 3Д'"
      - "Цена за квартиру (минимальная) в блоке '11 квартир от 8 725 200 ₽'"
      - "Символ валюты '₽' внутри строки цены"
    - Используй данные tag, текст, атрибуты.

    **Данные об элементах:**
    {elements_data}

    </no think>

xpath_fix_prompt:
  version: "1.0"
  description: "Исправление некорректных XPath-локаторов"
  content: |
    Ты – опытный системный аналитик и специалист по веб-тестированию.
    Твоя задача — **исправить некорректные XPath**, используя данные об элементе **и результаты валидации**.

    Сделай **один вызов** `fix_xpath_locators`, где `elements` — массив **той же длины**, что и входные данные, в том же порядке.

    **КРИТИЧЕСКИ ВАЖНО:** 
    - Количество объектов в ответе должно ТОЧНО соответствовать количеству входных элементов
    - Ты работаешь с частью данных (чанком), не со всей страницей
    - Не добавляй и не убирай элементы!
    
    **Что означают результаты валидации:**
    - `exists: false, count: 0` — локатор не найден на странице, нужно создать новый
    - `exists: true, count: > 1` — локатор находит несколько элементов, нужно сделать более специфичным

    **Требования к XPath:**
    1. **Обязательно используй относительный путь**: `//` или `.//`
    2. **Каждый локатор должен быть уникальным**: если находятся дубликаты — добавляй:
      - уникальные атрибуты;
      - текст родителя;
      - соседние элементы;
      - точный `normalize-space(.)` для коротких/уникальных текстов.
    3. Используй **все доступные** данные об элементе:
      - `tag`, `attributes` (особенно `class`, `style`, `type`),
      - `parent.tag`, `parent.attributes`, `parent.textContent.containsText`,
      - `siblings.prev` и `siblings.next` (их `tag`, `attributes`, `textContent`).
    4. Если XPath может потенциально совпасть с другим элементом на странице, уточни его.
    
    **Категорически запрещено**:
    - использовать `[1]`, `[2]` и другие индексы, **если можно обойтись без них**;
    - если индекс **всё же обязателен для уникальности**, оборачивай все в скобки, например:  
      `(//button[contains(., '...')])[1]`.
    - используй только ключевые слова из текста элемента, каждое слово отдельно.

    **Работа с текстом**:
    - Если `ownText` задан, точен и уникален, используй `normalize-space(.) = '...'`.
    - Если текст вложенный или содержит пробелы/неразрывные пробелы → `contains(., '...')`, но **только в связке с контекстом** (класс родителя, sibling с ценой/ID и т.д.).
    - Избегай `contains(., 'квартир')` в изоляции — это неуникально! Всегда сужай.

    **Требования к описанию:**
    - Укажи тип элемента и его роль:
      - "Число квартир в карточке объекта 'Город Алупка, Улица Левитана, д. 3Д'"
      - "Цена за квартиру (минимальная) в блоке '11 квартир от 8 725 200 ₽'"
      - "Символ валюты '₽' внутри строки цены"
    - Используй данные tag, текст, атрибуты.

    Сгенерируй для каждого элемента:
    1. **Точный и устойчивый относительный XPath-локатор** - должен находить **ровно один элемент на всей странице**.
    2. **Краткое описание** назначения/контента элемента.

    **Данные для исправления:**
    {fix_data}

    </no think>


auth_gosuslugi:
  version: "1.0"
  description: "Авторизация через Госуслуги"
  content: |
    Ты эксперт по автоматизации веб-интерфейсов. Твоя задача - выполнить ТОЛЬКО авторизацию через Госуслуги.
    
    ПОШАГОВЫЕ ИНСТРУКЦИИ:
    1. Найди ПЕРВУЮ кнопку авторизации на странице (кнопка Госуслуги всегда первая)
       - Ищи кнопки с изображениями или иконками
       - Госуслуги - это первая кнопка в списке методов авторизации
       - Нажми на первую кнопку авторизации
